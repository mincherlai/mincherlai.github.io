<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs>
  <radialGradient id="bg3" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#080c10"/>
    <stop offset="100%" stop-color="#020406"/>
  </radialGradient>
  <!-- Chamber metal / steel gradient -->
  <linearGradient id="steel1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#506070"/>
    <stop offset="40%" stop-color="#8aA0b0"/>
    <stop offset="60%" stop-color="#6a8090"/>
    <stop offset="100%" stop-color="#304050"/>
  </linearGradient>
  <linearGradient id="steel2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7a9ab0"/>
    <stop offset="50%" stop-color="#4a6070"/>
    <stop offset="100%" stop-color="#283848"/>
  </linearGradient>
  <!-- Viewport glass -->
  <radialGradient id="glassg" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#a0c8e0" stop-opacity="0.5"/>
    <stop offset="70%" stop-color="#204060" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#102030" stop-opacity="0.8"/>
  </radialGradient>
  <!-- Plasma/deposition glow inside chamber -->
  <radialGradient id="plasmag" cx="50%" cy="60%" r="55%">
    <stop offset="0%" stop-color="#0040a0" stop-opacity="0.6"/>
    <stop offset="50%" stop-color="#002060" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#000010" stop-opacity="0"/>
  </radialGradient>
  <!-- Flange gradient -->
  <linearGradient id="flange" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#9ab0c0"/>
    <stop offset="50%" stop-color="#607080"/>
    <stop offset="100%" stop-color="#405060"/>
  </linearGradient>
  <filter id="metalglow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
    <feFlood flood-color="#4080a0" flood-opacity="0.4" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="plasmaglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowblue" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
    <feFlood flood-color="#0060ff" flood-opacity="0.5" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
