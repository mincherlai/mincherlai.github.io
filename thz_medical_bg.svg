<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs>
  <radialGradient id="bg2" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#060e1e"/>
    <stop offset="100%" stop-color="#020508"/>
  </radialGradient>
  <!-- Cancer cell membrane gradient -->
  <radialGradient id="cellg" cx="42%" cy="38%" r="55%">
    <stop offset="0%" stop-color="#1a3828" stop-opacity="0.3"/>
    <stop offset="60%" stop-color="#0d2818" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#061810" stop-opacity="0.95"/>
  </radialGradient>
  <!-- Nucleus gradient -->
  <radialGradient id="nucg" cx="40%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#2a1848"/>
    <stop offset="100%" stop-color="#0c0620"/>
  </radialGradient>
  <!-- THz wave glow -->
  <filter id="waveglow" x="-10%" y="-50%" width="120%" height="200%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="cellglow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
    <feFlood flood-color="#20a040" flood-opacity="0.25" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="nucglow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
    <feFlood flood-color="#6030a0" flood-opacity="0.4" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="800" height="600" fill="url(#bg2)"/>

<!-- Subtle grid -->
<g opacity="0.06" stroke="#2050a0" stroke-width="0.5">
  <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
  <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
  <line x1="0" y1="500" x2="800" y2="500"/>
  <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
  <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
  <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  <line x1="700" y1="0" x2="700" y2="600"/>
</g>

<!-- ========== THz ELECTROMAGNETIC WAVE ========== -->
<!-- Main THz wave propagating left to right -->
<g filter="url(#waveglow)">
  <!-- E-field oscillation (vertical, cyan) -->
  <path d="M 30,300
    Q 60,180 90,300 Q 120,420 150,300
    Q 180,180 210,300 Q 240,420 270,300
    Q 300,180 330,300 Q 360,420 390,300
    Q 420,180 450,300 Q 480,420 510,300
    Q 540,180 570,300 Q 600,420 630,300
    Q 660,180 690,300 Q 720,420 750,300
    Q 780,180 800,300"
    fill="none" stroke="#00c8ff" stroke-width="2.5" opacity="0.8"/>

  <!-- Secondary wave (slightly offset, dimmer) -->
  <path d="M 30,300
    Q 60,200 90,300 Q 120,400 150,300
    Q 180,200 210,300 Q 240,400 270,300
    Q 300,200 330,300 Q 360,400 390,300
    Q 420,200 450,300 Q 480,400 510,300
    Q 540,200 570,300 Q 600,400 630,300
    Q 660,200 690,300 Q 720,400 750,300
    Q 780,200 800,300"
    fill="none" stroke="#0090e0" stroke-width="1.5" opacity="0.4"/>

  <!-- Wave envelope glow -->
  <path d="M 0,300 L 800,300" stroke="#00a0ff" stroke-width="1" opacity="0.3"/>
</g>

<!-- Propagation arrow -->
<g opacity="0.5">
  <line x1="50" y1="520" x2="200" y2="520" stroke="#00c8ff" stroke-width="1.5"/>
  <polygon points="200,515 215,520 200,525" fill="#00c8ff"/>
  <text x="60" y="545" font-size="10" fill="#00c8ff" font-family="monospace" opacity="0.8">THz propagation</text>
</g>

<!-- Frequency label -->
<text x="50" y="50" font-size="13" fill="#5090b0" font-family="monospace" opacity="0.6" font-weight="bold">THz-TDS</text>
<text x="50" y="70" font-size="10" fill="#406080" font-family="monospace" opacity="0.5">0.1 – 10 THz</text>
<text x="50" y="88" font-size="10" fill="#406080" font-family="monospace" opacity="0.5">λ = 30 μm – 3 mm</text>

<!-- ========== CANCER CELL MODEL ========== -->
<!-- Main cancer cell (irregular shape using path) -->
<g transform="translate(540, 290)" filter="url(#cellglow)">
  <!-- Irregular cell membrane -->
  <path d="M 0,-75 C 25,-80 50,-70 65,-55
    C 82,-38 88,-15 85,10
    C 82,35 75,55 58,68
    C 40,82 15,85 -10,80
    C -35,75 -55,65 -68,48
    C -82,30 -88,5 -82,-20
    C -78,-45 -65,-62 -48,-72
    C -30,-82 -15,-78 0,-75 Z"
    fill="url(#cellg)" stroke="#30a050" stroke-width="1.5" opacity="0.8"/>

  <!-- Membrane protrusions (cancer cell characteristic) -->
  <path d="M 65,-55 C 78,-60 82,-48 72,-42" fill="none" stroke="#30a050" stroke-width="1" opacity="0.6"/>
  <path d="M 85,10 C 98,8 95,22 88,20" fill="none" stroke="#30a050" stroke-width="1" opacity="0.6"/>
  <path d="M -82,-20 C -96,-25 -95,-12 -86,-15" fill="none" stroke="#30a050" stroke-width="1" opacity="0.6"/>
  <path d="M 58,68 C 68,78 60,82 55,75" fill="none" stroke="#30a050" stroke-width="1" opacity="0.5"/>
  <path d="M -68,48 C -80,55 -78,62 -72,55" fill="none" stroke="#30a050" stroke-width="1" opacity="0.5"/>

  <!-- Nucleus (irregular, larger than normal - cancer characteristic) -->
  <ellipse cx="-5" cy="5" rx="38" ry="32" fill="url(#nucg)" stroke="#6040a0" stroke-width="1.2" filter="url(#nucglow)" opacity="0.9" transform="rotate(-10)"/>

  <!-- Nucleolus -->
  <circle cx="-10" cy="0" r="12" fill="#1a1040" stroke="#5030a0" stroke-width="0.8" opacity="0.8"/>

  <!-- Chromatin / DNA structures inside nucleus -->
  <path d="M -25,-10 Q -15,-20 -5,-12 Q 5,-5 15,-15" fill="none" stroke="#5040a0" stroke-width="0.7" opacity="0.5"/>
  <path d="M -20,15 Q -10,8 0,18 Q 10,25 20,12" fill="none" stroke="#5040a0" stroke-width="0.7" opacity="0.5"/>

  <!-- Organelles (mitochondria-like) -->
  <ellipse cx="40" cy="-30" rx="12" ry="6" fill="#102818" stroke="#2a6038" stroke-width="0.8" opacity="0.6" transform="rotate(30,40,-30)"/>
  <ellipse cx="-45" cy="35" rx="10" ry="5" fill="#102818" stroke="#2a6038" stroke-width="0.8" opacity="0.6" transform="rotate(-20,-45,35)"/>
  <ellipse cx="30" cy="45" rx="9" ry="5" fill="#102818" stroke="#2a6038" stroke-width="0.8" opacity="0.5" transform="rotate(45,30,45)"/>

  <!-- Cell surface receptors -->
  <circle cx="68" cy="-40" r="3" fill="#40c060" opacity="0.5"/>
  <circle cx="80" cy="15" r="3" fill="#40c060" opacity="0.5"/>
  <circle cx="-75" cy="-25" r="3" fill="#40c060" opacity="0.5"/>
  <circle cx="-60" cy="55" r="3" fill="#40c060" opacity="0.5"/>
  <circle cx="45" cy="72" r="3" fill="#40c060" opacity="0.5"/>
</g>

<!-- Second smaller cancer cell (background) -->
<g transform="translate(680, 180) scale(0.5)" opacity="0.4">
  <path d="M 0,-70 C 22,-75 48,-65 62,-50
    C 78,-32 82,-10 78,15
    C 75,38 68,52 52,62
    C 35,75 12,78 -12,72
    C -35,68 -52,58 -65,42
    C -78,25 -82,2 -78,-22
    C -72,-42 -60,-58 -45,-68
    C -28,-78 -12,-72 0,-70 Z"
    fill="url(#cellg)" stroke="#30a050" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="0" cy="5" rx="30" ry="25" fill="url(#nucg)" stroke="#6040a0" stroke-width="1" opacity="0.7"/>
</g>

<!-- Third cancer cell (background, left) -->
<g transform="translate(380, 430) scale(0.4)" opacity="0.3">
  <path d="M 0,-65 C 20,-70 45,-60 58,-45
    C 72,-28 78,-5 72,18
    C 68,38 60,48 48,58
    C 32,68 10,72 -12,68
    C -32,62 -48,52 -60,38
    C -72,22 -75,0 -72,-22
    C -68,-40 -56,-55 -42,-62
    C -25,-72 -10,-68 0,-65 Z"
    fill="url(#cellg)" stroke="#30a050" stroke-width="1.5"/>
  <ellipse cx="0" cy="2" rx="25" ry="20" fill="url(#nucg)" stroke="#6040a0" stroke-width="1"/>
</g>

<!-- THz wave interaction indicators -->
<g opacity="0.35">
  <!-- Absorption/scattering lines near the main cell -->
  <line x1="460" y1="260" x2="475" y2="245" stroke="#00e0ff" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="460" y1="300" x2="470" y2="300" stroke="#00e0ff" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="460" y1="340" x2="475" y2="355" stroke="#00e0ff" stroke-width="0.8" stroke-dasharray="3,2"/>
</g>

<!-- Label: non-invasive diagnostics -->
<text x="580" y="540" text-anchor="middle" font-size="10" fill="#5090a0" font-family="monospace" opacity="0.5">non-invasive diagnostics</text>
</svg>
