<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#0a1535"/>
    <stop offset="100%" stop-color="#000c1a"/>
  </radialGradient>
  <!-- Pb atom gradient (blue-gray) -->
  <radialGradient id="pbg" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#a0c8e8"/>
    <stop offset="50%" stop-color="#4a7a9a"/>
    <stop offset="100%" stop-color="#1a3a5a"/>
  </radialGradient>
  <!-- I/Br halide gradient (purple) -->
  <radialGradient id="ig" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#e0a0ff"/>
    <stop offset="50%" stop-color="#9040c0"/>
    <stop offset="100%" stop-color="#401870"/>
  </radialGradient>
  <!-- MA+ organic cation gradient (green) -->
  <radialGradient id="cg" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#80ffb0"/>
    <stop offset="50%" stop-color="#20a060"/>
    <stop offset="100%" stop-color="#084028"/>
  </radialGradient>
  <!-- N atom (blue) -->
  <radialGradient id="ng" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#90c0ff"/>
    <stop offset="50%" stop-color="#2060c0"/>
    <stop offset="100%" stop-color="#0c1e60"/>
  </radialGradient>
  <!-- H atom (white) -->
  <radialGradient id="hg" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="50%" stop-color="#c0c0c0"/>
    <stop offset="100%" stop-color="#606060"/>
  </radialGradient>
  <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
    <feFlood flood-color="#3080c0" flood-opacity="0.5" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
    <feFlood flood-color="#9040c0" flood-opacity="0.4" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
    <feFlood flood-color="#20a060" flood-opacity="0.5" result="col"/>
    <feComposite in="col" in2="blur" operator="in" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="800" height="600" fill="url(#bg)"/>

<!-- Subtle grid -->
<g opacity="0.08" stroke="#3060a0" stroke-width="0.5">
  <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
  <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
  <line x1="0" y1="500" x2="800" y2="500"/>
  <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
  <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
  <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  <line x1="700" y1="0" x2="700" y2="600"/>
</g>

<!-- ========== ABX3 Perovskite Unit Cell ========== -->
<!-- Isometric-style cubic unit cell centered at (400,300) -->
<!-- Cube edge = 180px, projected with ~30° isometric -->

<!-- Unit cell edges (wireframe) -->
<g stroke="#4080b0" stroke-width="1.2" opacity="0.5" fill="none">
  <!-- Bottom face -->
  <line x1="310" y1="400" x2="490" y2="400"/>
  <line x1="490" y1="400" x2="540" y2="330"/>
  <line x1="540" y1="330" x2="360" y2="330"/>
  <line x1="360" y1="330" x2="310" y2="400"/>
  <!-- Top face -->
  <line x1="310" y1="220" x2="490" y2="220"/>
  <line x1="490" y1="220" x2="540" y2="150"/>
  <line x1="540" y1="150" x2="360" y2="150"/>
  <line x1="360" y1="150" x2="310" y2="220"/>
  <!-- Vertical edges -->
  <line x1="310" y1="400" x2="310" y2="220"/>
  <line x1="490" y1="400" x2="490" y2="220"/>
  <line x1="540" y1="330" x2="540" y2="150"/>
  <line x1="360" y1="330" x2="360" y2="150"/>
</g>

<!-- B-site: Pb atoms at cube corners (blue-gray, r=14) -->
<!-- Bottom face corners -->
<circle cx="310" cy="400" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.9"/>
<circle cx="490" cy="400" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.9"/>
<circle cx="540" cy="330" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.85"/>
<circle cx="360" cy="330" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.85"/>
<!-- Top face corners -->
<circle cx="310" cy="220" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.9"/>
<circle cx="490" cy="220" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.9"/>
<circle cx="540" cy="150" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.85"/>
<circle cx="360" cy="150" r="14" fill="url(#pbg)" filter="url(#glow1)" opacity="0.85"/>

<!-- X-site: Halide (I/Br) atoms at face centers / edge midpoints (purple, r=11) -->
<!-- Bottom face edges -->
<circle cx="400" cy="400" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.85"/>
<circle cx="515" cy="365" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>
<circle cx="335" cy="365" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>
<circle cx="450" cy="365" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>
<!-- Top face edges -->
<circle cx="400" cy="220" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.85"/>
<circle cx="515" cy="185" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>
<circle cx="335" cy="185" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>
<circle cx="450" cy="185" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>
<!-- Vertical edges -->
<circle cx="310" cy="310" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.85"/>
<circle cx="490" cy="310" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.85"/>
<circle cx="540" cy="240" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>
<circle cx="360" cy="240" r="11" fill="url(#ig)" filter="url(#glow2)" opacity="0.8"/>

<!-- A-site: MA+ (CH3NH3+) organic cation at body center (green, r=18) -->
<circle cx="415" cy="285" r="20" fill="url(#cg)" filter="url(#glow3)" opacity="0.95"/>
<!-- MA molecule representation inside the green sphere -->
<text x="415" y="279" text-anchor="middle" font-size="7" fill="#ffffff" font-family="sans-serif" font-weight="bold" opacity="0.8">CH₃</text>
<text x="415" y="295" text-anchor="middle" font-size="7" fill="#ffffff" font-family="sans-serif" font-weight="bold" opacity="0.8">NH₃⁺</text>

<!-- Octahedral bonds connecting X-site halides around B-site -->
<g stroke="#8060c0" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,3">
  <!-- Some octahedral connections -->
  <line x1="400" y1="400" x2="400" y2="220"/>
  <line x1="310" y1="310" x2="490" y2="310"/>
  <line x1="335" y1="365" x2="515" y2="185"/>
</g>

<!-- Labels -->
<text x="50" y="52" font-size="13" fill="#6a90b0" font-family="monospace" opacity="0.6" font-weight="bold">ABX₃ PEROVSKITE</text>
<text x="50" y="72" font-size="10" fill="#4a70a0" font-family="monospace" opacity="0.5">CH₃NH₃PbI₃</text>

<!-- Legend -->
<g transform="translate(600,450)" opacity="0.65">
  <circle cx="0" cy="0" r="8" fill="url(#pbg)"/>
  <text x="14" y="4" font-size="10" fill="#8ab0d0" font-family="sans-serif">Pb²⁺ (B-site)</text>
  <circle cx="0" cy="28" r="7" fill="url(#ig)"/>
  <text x="14" y="32" font-size="10" fill="#c080e0" font-family="sans-serif">I⁻ / Br⁻ (X-site)</text>
  <circle cx="0" cy="56" r="9" fill="url(#cg)"/>
  <text x="14" y="60" font-size="10" fill="#60c080" font-family="sans-serif">MA⁺ (A-site)</text>
</g>

<!-- Secondary unit cell ghost (smaller, back-right) for depth -->
<g opacity="0.2" transform="translate(120,-60) scale(0.5)">
  <g stroke="#4080b0" stroke-width="1" fill="none">
    <line x1="310" y1="400" x2="490" y2="400"/>
    <line x1="490" y1="400" x2="540" y2="330"/>
    <line x1="540" y1="330" x2="360" y2="330"/>
    <line x1="360" y1="330" x2="310" y2="400"/>
    <line x1="310" y1="220" x2="490" y2="220"/>
    <line x1="490" y1="220" x2="540" y2="150"/>
    <line x1="540" y1="150" x2="360" y2="150"/>
    <line x1="360" y1="150" x2="310" y2="220"/>
    <line x1="310" y1="400" x2="310" y2="220"/>
    <line x1="490" y1="400" x2="490" y2="220"/>
    <line x1="540" y1="330" x2="540" y2="150"/>
    <line x1="360" y1="330" x2="360" y2="150"/>
  </g>
  <circle cx="310" cy="400" r="12" fill="url(#pbg)"/>
  <circle cx="490" cy="400" r="12" fill="url(#pbg)"/>
  <circle cx="540" cy="330" r="12" fill="url(#pbg)"/>
  <circle cx="360" cy="330" r="12" fill="url(#pbg)"/>
  <circle cx="310" cy="220" r="12" fill="url(#pbg)"/>
  <circle cx="490" cy="220" r="12" fill="url(#pbg)"/>
  <circle cx="540" cy="150" r="12" fill="url(#pbg)"/>
  <circle cx="360" cy="150" r="12" fill="url(#pbg)"/>
  <circle cx="415" cy="285" r="16" fill="url(#cg)"/>
</g>

<!-- Another ghost cell (left-front) -->
<g opacity="0.15" transform="translate(-180,80) scale(0.45)">
  <g stroke="#4080b0" stroke-width="1" fill="none">
    <line x1="310" y1="400" x2="490" y2="400"/>
    <line x1="490" y1="400" x2="540" y2="330"/>
    <line x1="540" y1="330" x2="360" y2="330"/>
    <line x1="360" y1="330" x2="310" y2="400"/>
    <line x1="310" y1="220" x2="490" y2="220"/>
    <line x1="490" y1="220" x2="540" y2="150"/>
    <line x1="540" y1="150" x2="360" y2="150"/>
    <line x1="360" y1="150" x2="310" y2="220"/>
    <line x1="310" y1="400" x2="310" y2="220"/>
    <line x1="490" y1="400" x2="490" y2="220"/>
    <line x1="540" y1="330" x2="540" y2="150"/>
    <line x1="360" y1="330" x2="360" y2="150"/>
  </g>
  <circle cx="415" cy="285" r="14" fill="url(#cg)"/>
</g>
</svg>
